format = """
[έΨΣέΨΤέΨΥ](#a3aed2)\
$os\
$hostname\
[ΌΓ┤](bg:#769ff0 fg:#a3aed2)\
$directory\
[ΌΓ┤](fg:#769ff0 bg:#394260)\
$git_branch\
$git_state\
$git_metrics\
$git_status\
[ΌΓ┤](fg:#394260 bg:#212736)\
$python\
$rust\
$c\
$cmake\
$kubernetes\
$openstack\
$memory_usage\
$jobs\
[ΌΓ┤](fg:#212736)$fill\
[ΌΓ╢](fg:#212736)$cmd_duration(bg:#212736 fg:#212736)\
[ΌΓ╢](fg:#394260 bg:#212736)$time[](fg:#a3aed2 bg:#394260)\n$character"""

[fill]
symbol = ' '

[os]
disabled = false
style = "bg:#a3aed2 fg:#090c0c"
format = "[ $symbol ]($style)"

[os.symbols]
Macos = "ΌεΣ"
Linux = "ΌεΤ"
Ubuntu = "≤░ΧΙ"
Debian = "ΎΝΗ"
Arch = "ΎΝΔ"
Fedora = "ΎΝΛ"
NixOS = "ΎΝΥ"
Unknown = "ΎΙφ"

[hostname]
ssh_only = true
style = "bg:#a3aed2 fg:#090c0c"
format = "[ $hostname ]($style)"

[kubernetes]
disabled = false
style = "bg:#212736"
format = '[[ έΟΙ $context( ($namespace)) ](fg:#769ff0 bg:#212736)]($style)'
detect_files = ["k8s", "kubernetes", "helmfile.yaml", "Chart.yaml", "skaffold.yaml"]

[openstack]
disabled = false
style = "bg:#212736"

[memory_usage]
disabled = false
threshold = 75
symbol = "≤░Ξδ "
style = "bg:#212736"
format = '[[ $symbol$ram( | $swap) ](fg:#769ff0 bg:#212736)]($style)'

[jobs]
disabled = false
symbol = "έεο"
style = "bg:#212736"
format = '[[ $symbol $number ](fg:#769ff0 bg:#212736)]($style)'
number_threshold = 1

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 5
truncation_symbol = "έΑο/"

[character]
success_symbol = '[έηε](bold green) '
error_symbol = '[έεΩ](bold red) '

[directory.substitutions]
"Documents" = "≤░Ιβ "
"Downloads" = "ΎΑβ "
"Music" = "ΎΑΒ "
"Pictures" = "ΎΑ╛ "

[git_branch]
symbol = "ΎΡα"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

[git_state]
style = "bg:#394260"
format = '[[ $state( $progress_current/$progress_total) ](fg:#769ff0 bg:#394260)]($style)'

[git_metrics]
disabled = false
format = '[[ +$added(-$deleted) ](fg:#769ff0 bg:#394260)]'

[c]
symbol = "Όαη "
commands =[ [ 'cc', '--version' ], [ 'gcc', '--version' ], [ 'clang', '--version' ] ]
format = "[[$symbol](fg:#769ff0 bg:#212736)]($style)"

[cmake]
style = "bg:#212736"
format = "[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)"

[python]
symbol = "ΌΙ╡ "
style = "bg:#212736"
format = '[[ $symbol ($version) $virtualenv ](fg:#769ff0 bg:#212736)]($style)'

[rust]
symbol = "Όηρ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#394260"
format = '[[ ΎΡ║ $time ](fg:#769ff0 bg:#394260)]($style)'

[cmd_duration]
disabled = false
min_time = 2 # Only show if the command took at least 2 seconds (customize this as needed)
style = "bg:#212736"
format = '[[ έΠ▒ $duration ](fg:#a0a9cb bg:#212736)]($style)'
