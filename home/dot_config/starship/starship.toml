format = """
[в–‘в–’в–“](#a3aed2)\
[ оң‘ ](bg:#a3aed2 fg:#090c0c)\
[оӮҙ](bg:#769ff0 fg:#a3aed2)\
$directory\
[оӮҙ](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
[оӮҙ](fg:#394260 bg:#212736)\
$python\
$rust\
[оӮҙ](fg:#212736)$fill\
[оӮ¶](fg:#212736)$cmd_duration(bg:#212736 fg:#212736)\
[оӮ¶](fg:#394260 bg:#212736)$time[](fg:#a3aed2 bg:#394260)\n$character"""

[fill]
symbol = ' '

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 5
truncation_symbol = "вҖҰ/"

[character]
success_symbol = '[вһң](bold green) '
error_symbol = '[вң—](bold red) '

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

[c]
symbol = "оҳһ "
commands =[ [ 'cc', '--version' ], [ 'gcc', '--version' ], [ 'clang', '--version' ] ]
format = "[[$symbol](fg:#769ff0 bg:#212736)]($style)"

[cmake]
style = "bg:#212736"
format = "[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)"

[python]
symbol = "оҲө "
style = "bg:#212736"
format = '[[ $symbol ($version) $virtualenv ](fg:#769ff0 bg:#212736)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#394260"
format = '[[ пҗә $time ](fg:#769ff0 bg:#394260)]($style)'

[cmd_duration]
disabled = false
min_time = 2 # Only show if the command took at least 2 seconds (customize this as needed)
style = "bg:#212736"
format = '[[ вҸұ $duration ](fg:#a0a9cb bg:#212736)]($style)'
